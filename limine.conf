# Limine boot configuration for Xenith.
#
# This file is consumed by the Limine bootloader (v8.x) at boot time. It is
# copied verbatim into the ISO at /boot/limine/limine.conf by
# scripts/make-iso.sh, and the same file is placed on the EFI System
# Partition for USB boot (see docs/RUNNING.md).
#
# Limine scans the boot media for a config file in this order:
#   /boot/limine/limine.conf  (used here)
#   /boot/limine.conf
#   /limine/limine.conf
#   /limine.conf
# We use the first candidate so the boot/ tree mirrors a conventional Linux
# ESP layout and the same directory holds the Limine binaries.
#
# Option names are case-insensitive; we use the canonical lowercase form
# documented in Limine's CONFIG.md. Values are free-form and whitespace-
# separated; continuation is not supported, so every option is one line.

# Wait 3 seconds on the boot menu before booting the default entry. This is
# long enough to interrupt with a key for menu interaction, short enough that
# unattended QEMU runs do not stall. Set to 0 for instant boot or `no` to
# disable the timeout entirely.
timeout: 3

# Default framebuffer resolution. Limine will try this mode first and fall
# back to a similar mode (or the firmware default) if the exact mode is
# unavailable. The bpp is omitted so Limine uses 32 (the documented default).
# 1024x768 is a safe VESA mode available on virtually every target (QEMU,
# Bochs, real hardware VBIOS, and OVMF UEFI).
resolution: 1024x768

# ---------------------------------------------------------------------------
# Default boot entry.
#
# `protocol` selects which Limine boot protocol to use. The `limine` protocol
# is the native one and what xenith-boot is written against: it passes a
# Limine-protocol BootInfo structure to the kernel with the memory map,
# framebuffers, RSDP, modules, and the HHDM pointer.
# ---------------------------------------------------------------------------
/Xenith
    protocol: limine
    kernel_path: boot():/boot/xenith
    kernel_cmdline: serial log_level=info

    # Initramfs module. The kernel's module loader (user/init path) expects
    # the userspace ELF programs to arrive as Limine modules. This entry is
    # commented out until the initramfs image is built by the user/ pipeline;
    # uncomment it once scripts/make-initramfs.sh produces build/initramfs.
    # The kernel identifies the initramfs by the module_string below.
    # module_path: boot():/boot/initramfs
    # module_cmdline: initramfs

# ---------------------------------------------------------------------------
# Debug entry: same kernel, verbose logging, drop to a serial console early.
# ---------------------------------------------------------------------------
/Xenith (debug)
    protocol: limine
    kernel_path: boot():/boot/xenith
    kernel_cmdline: serial log_level=trace early_serial
    resolution: 1024x768

# ---------------------------------------------------------------------------
# Recovery entry: minimal command line for booting when the framebuffer or
# console stack is suspected to be broken. Forces serial-only output so the
# kernel never touches the framebuffer during early boot.
# ---------------------------------------------------------------------------
/Xenith (serial only)
    protocol: limine
    kernel_path: boot():/boot/xenith
    kernel_cmdline: serial log_level=debug serial_only
